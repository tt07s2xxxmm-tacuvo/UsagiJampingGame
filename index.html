<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>うさぎのジャンピングスター</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game-container">
    <canvas id="gameCanvas" width="700" height="450"></canvas>
    
    <div id="ui-layer">
        <div id="score-label" class="hud-text">スコア: 0</div>
        <div id="info-label" class="hud-text">画面タップでジャンプ！ 雲にふれてフィーバーを目指せ！☁️🌟</div>
        
        <div id="menu-buttons" class="menu-buttons">
            <button id="btn-easy" class="btn btn-easy" data-speed="4" data-min="60" data-max="100" data-target="5000">かんたん</button>
            <button id="btn-normal" class="btn btn-normal" data-speed="6" data-min="45" data-max="85" data-target="12000">ふつう</button>
            <button id="btn-hard" class="btn btn-hard" data-speed="9" data-min="30" data-max="60" data-target="25000">むずかしい</button>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
